<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sakura Center</title>
    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.ibb.co/L6V2YvQ/sakura-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        /* Dòng chữ nhỏ cảnh báo ở góc */
        .notice {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
            pointer-events: none;
        }

        .box {
            background: rgba(30, 30, 30, 0.9);
            padding: 35px;
            border-radius: 25px;
            border: 2px solid #ffb7c5;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 183, 197, 0.2);
            width: 320px;
            z-index: 5;
        }

        .logo {
            width: 150px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px #fff);
        }

        h2 { color: #ffb7c5; margin: 0 0 10px 0; letter-spacing: 1px; }

        input {
            width: 90%;
            padding: 12px;
            background: #000;
            border: 1px solid #ffb7c5;
            color: #00ff00;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            outline: none;
        }

        .btn {
            background: #ffb7c5;
            color: #4a101a;
            border: none;
            padding: 13px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #fff; transform: scale(1.03); }

        #result { margin-top: 15px; font-weight: bold; min-height: 20px; }

        /* Hiệu ứng hoa rơi */
        .petal {
            position: absolute;
            background: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.6;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="notice">
        Mô phỏng giải trí - Không cổ xúy lừa đảo.<br>Vui lòng cảnh giác với các trang web giả mạo.
    </div>

    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="logo" alt="Roblox">
        
        <h2>REDEEM</h2>
        <p style="font-size: 13px; color: #ffb7c5;">Nhập mã tự vẽ của bạn vào đây</p>
        
        <input type="text" id="codeInp" placeholder="MÃ CODE...">
        <button class="btn" onclick="check()">XÁC NHẬN</button>
        
        <div id="result"></div>
    </div>

    <script>
        // --- THAY 4 MÃ CỦA BẠN VÀO ĐÂY ---
        const listCode = ["CODE1", "CODE2", "CODE3", "CODE4"];

        function check() {
            let val = document.getElementById('codeInp').value.trim().toUpperCase();
            let res = document.getElementById('result');

            if (listCode.includes(val)) {
                res.style.color = "#00ff00";
                res.innerHTML = "✅ XỬ LÝ THÀNH CÔNG!<br>Vật phẩm đã được chuyển vào kho của bạn.";
            } else if (val === "") {
                res.style.color = "#ffff00";
                res.innerHTML = "Nhập mã đi bạn ơi!";
            } else {
                res.style.color = "#ff4d4d";
                res.innerHTML = "❌ Mã không hợp lệ!";
            }
        }

        // Hiệu ứng hoa anh đào rơi
        function spawnPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            let size = Math.random() * 8 + 5 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 6000);
        }
        setInterval(spawnPetal, 400);
    </script>
</body>
</html>
