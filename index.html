<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDEEM CENTER</title>
    <style>
        /* Giao diện tối, viền đỏ/hồng cho cháy */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            width: 90%;
            max-width: 400px;
        }
        /* Chỗ này để ảnh của bạn */
        .banner-img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        h2 { letter-spacing: 2px; color: #ff0055; }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #000;
            color: #00ff00;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
        }
        .btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            width: 88%;
            transition: 0.3s;
        }
        .btn:hover { background: #ff3377; transform: scale(1.02); }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/xxxxx/your-photo.jpg" class="banner-img" alt="Baddie Center">
    
    <h2>REDEEM CODES</h2>
    <p>Nhập mã bạn tự vẽ vào đây:</p>
    
    <input type="text" id="coupon" placeholder="ENTER CODE...">
    <button class="btn" onclick="processRedeem()">XÁC NHẬN MÃ</button>
    
    <div id="status"></div>
</div>

<script>
    function processRedeem() {
        var input = document.getElementById("coupon").value.trim().toUpperCase();
        var status = document.getElementById("status");

        // --- CHỖ SỬA 4 CÁI MÃ CỦA BẠN ---
        var code1 = "MA1"; 
        var code2 = "MA2";
        var code3 = "MA3";
        var code4 = "MA4";
        // --------------------------------

        if (input === "") {
            status.style.color = "yellow";
            status.innerHTML = "Vui lòng nhập gì đó đi má!";
        } 
        else if (input === code1 || input === code2 || input === code3 || input === code4) {
            status.style.color = "#00ff00";
            status.innerHTML = "✅ MÃ CHUẨN! Đang xử lý phần thưởng...";
            // Bạn có thể thêm lệnh chuyển hướng link ở đây nếu muốn
        } 
        else {
            status.style.color = "#ff0000";
            status.innerHTML = "❌ Mã này sai rồi, kiểm tra lại đi!";
        }
    }
</script>

</body>
</html>
