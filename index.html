<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA ROBUX STORE - SIMULATOR</title>
    <style>
        :root { --sakura: #ffb7c5; --dark-pink: #ff8fa3; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 2px solid var(--sakura); 
            background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo-text { font-size: 20px; font-weight: bold; text-shadow: 0 0 10px var(--sakura); }
        .stat { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px; border: 1px solid var(--sakura); font-size: 13px; font-weight: bold; margin-left: 5px; }

        .shop-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 800px; margin: auto; }
        
        .item-card { 
            background: #1a1a1a; border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,183,197,0.3); text-align: center; padding-bottom: 15px;
        }
        .item-img { height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #222; }
        .rbx-icon { width: 40px; filter: drop-shadow(0 0 5px #fff); }

        /* PHẦN RÚT ROBUX Ở CUỐI */
        .withdraw-section {
            background: rgba(255, 183, 197, 0.05); padding: 30px 20px;
            border-top: 2px solid var(--sakura); text-align: center; margin-top: 40px;
        }
        .withdraw-box { max-width: 400px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid var(--sakura); }
        input { 
            width: 80%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid var(--sakura); background: #000; color: #fff; text-align: center;
        }

        /* MODAL VÒNG QUAY CÓ HÌNH */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center;
        }
        .wheel {
            width: 260px; height: 260px; border-radius: 50%; border: 5px solid #fff;
            margin: 20px auto; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #ffb7c5 0deg 90deg, #ff8fa3 90deg 180deg, 
                #ffb7c5 180deg 270deg, #ff8fa3 270deg 360deg
            );
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .wheel-item-img { position: absolute; width: 35px; }

        .btn-main { background: var(--sakura); color: #4a101a; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Loading */
        .loader { display: none; width: 30px; height: 30px; border: 4px solid #333; border-top: 4px solid var(--sakura); border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .petal { position: absolute; background: var(--sakura); border-radius: 100% 0 100% 0; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">SAKURA STORE</div>
        <div style="display:flex;">
            <div class="stat">💰 <span id="money">0</span>$</div>
            <div class="stat">💎 <span id="robux">0</span> R$</div>
        </div>
    </header>

    <div class="shop-container">
        <div class="item-card">
            <div class="item-img"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="rbx-icon"><div style="font-weight:bold;">2,500 R$</div></div>
            <p style="font-size:12px;">Giá: 49,000đ</p>
            <button class="btn-main" onclick="buy(49000, 2500)" style="width:80%;">MUA</button>
        </div>
        <div class="item-card">
            <div class="item-img"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="rbx-icon"><div style="font-weight:bold;">6,000 R$</div></div>
            <p style="font-size:12px;">Giá: 99,000đ</p>
            <button class="btn-main" onclick="buy(99000, 6000)" style="width:80%;">MUA</button>
        </div>
        <div class="item-card" style="grid-column: span 2;">
            <h3 style="color:var(--sakura);">🌸 TÚI MÙ ĐẠI GIA (149K) 🌸</h3>
            <button class="btn-main" onclick="openWheel()" style="width:50%;">MỞ TÚI MÙ</button>
        </div>
    </div>

    <div class="withdraw-section">
        <div class="withdraw-box">
            <h3 style="color:var(--sakura); margin-top:0;">💎 RÚT ROBUX VỀ MÁY</h3>
            <input type="text" id="wdName" placeholder="Nhập tên nhân vật...">
            <input type="number" id="wdAmount" placeholder="Số Robux muốn rút...">
            <div id="wdLoader" class="loader"></div>
            <button class="btn-main" id="wdBtn" onclick="withdraw()">XÁC NHẬN RÚT</button>
            <p id="wdMsg" style="font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="wheelModal" class="modal">
        <div style="background:#1a1a1a; padding:25px; border-radius:20px; border:2px solid var(--sakura); text-align:center; width:320px;">
            <h2 style="color:var(--sakura); margin:0;">LUCKY SPIN</h2>
            <div style="position:relative;">
                <div style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-top:25px solid #fff; z-index:10;"></div>
                <div id="mainWheel" class="wheel">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="wheel-item-img" style="top:20px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="wheel-item-img" style="right:20px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="wheel-item-img" style="bottom:20px;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="wheel-item-img" style="left:20px;">
                </div>
            </div>
            <button class="btn-main" id="spinBtn" onclick="spin()">QUAY NGAY</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; margin-top:10px; cursor:pointer;">Đóng</button>
        </div>
    </div>

    <script>
        let money = 50000; let robux = 0;
        // Trợ cấp 10k mỗi 30s
        setInterval(() => { money += 10000; update(); }, 30000);

        function update() {
            document.getElementById('money').innerText = money.toLocaleString();
            document.getElementById('robux').innerText = robux.toLocaleString();
        }

        function buy(p, r) {
            if(money >= p) { money -= p; robux += r; update(); alert("✅ Đã mua thành công!"); }
            else { alert("❌ Bạn không đủ tiền!"); }
        }

        function openWheel() { document.getElementById('wheelModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('wheelModal').style.display = 'none'; }

        function spin() {
            if(money < 149000) { alert("Thiếu tiền mở túi!"); return; }
            money -= 149000; update();
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            const deg = Math.floor(Math.random() * 360) + 1800;
            document.getElementById('mainWheel').style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                let win = [100, 500, 10000, 50000][Math.floor(Math.random()*4)];
                alert(`🌸 TRÚNG ${win.toLocaleString()} ROBUX!`);
                robux += win; update(); btn.disabled = false;
            }, 4000);
        }

        function withdraw() {
            let name = document.getElementById('wdName').value;
            let amt = parseInt(document.getElementById('wdAmount').value);
            let msg = document.getElementById('wdMsg');
            let btn = document.getElementById('wdBtn');
            let loader = document.getElementById('wdLoader');

            if(!name || !amt) { alert("Nhập đủ thông tin!"); return; }
            if(amt > robux) { alert("Bạn không có đủ Robux!"); return; }

            btn.style.display = "none";
            loader.style.display = "block";
            msg.innerText = "Đang kết nối đến máy chủ Roblox...";

            setTimeout(() => {
                robux -= amt; update();
                loader.style.display = "none";
                btn.style.display = "block";
                msg.style.color = "#00ff00";
                msg.innerText = `✅ THÀNH CÔNG! ${amt.toLocaleString()} Robux đang được chuyển đến ${name}.`;
                document.getElementById('wdAmount').value = "";
            }, 3000);
        }

        // Hoa rơi
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 7 + 5 + 'px';
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }, 300);
        update();
    </script>
</body>
</html>
