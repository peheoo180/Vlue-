<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 SAKURA PREMIUM STORE 🌸</title>
    <style>
        :root { --sakura: #ffb7c5; --neon-pink: #ff007f; --neon-blue: #00f2ff; --neon-green: #39ff14; }
        body { background: #050505; color: white; font-family: 'Lexend', sans-serif; margin: 0; overflow-x: hidden; }

        /* Hiệu ứng hào quang cho Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; border-bottom: 3px solid var(--sakura); 
            background: rgba(10, 10, 10, 0.9); position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 0 20px var(--sakura);
        }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); }
        .stats { display: flex; gap: 10px; }
        .stat-card { background: #000; padding: 8px 15px; border-radius: 12px; border: 2px solid var(--sakura); box-shadow: inset 0 0 10px var(--sakura); font-weight: bold; font-size: 14px; }

        /* Grid sản phẩm lung linh */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 25px; max-width: 900px; margin: auto; }
        
        .card { 
            background: #111; border-radius: 20px; overflow: hidden; position: relative;
            border: 2px solid rgba(255,255,255,0.1); transition: 0.4s;
            cursor: pointer; animation: glow 3s infinite alternate;
        }
        @keyframes glow {
            from { border-color: var(--neon-pink); box-shadow: 0 0 5px var(--neon-pink); }
            to { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        }
        .card:hover { transform: scale(1.05) rotate(1deg); z-index: 10; }

        .card-img { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #222, #000); }
        .item-icon { width: 70px; filter: drop-shadow(0 0 15px #fff); }
        .item-label { margin-top: 10px; font-weight: 900; font-size: 18px; color: #fff; text-shadow: 0 0 5px #000; }
        
        .price-badge { position: absolute; top: 10px; right: 10px; background: #ff0055; padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; box-shadow: 0 0 10px #ff0055; }

        .card-info { padding: 15px; text-align: center; background: linear-gradient(to top, #1a1a1a, transparent); }
        .buy-txt { font-weight: bold; color: var(--sakura); text-transform: uppercase; font-size: 12px; }

        /* MODAL KHUI QUÀ */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #151515; padding: 40px; border-radius: 30px; border: 3px solid var(--sakura);
            text-align: center; width: 340px; box-shadow: 0 0 50px var(--sakura);
        }
        .loading-spin { width: 60px; height: 60px; border: 6px solid #222; border-top: 6px solid var(--neon-pink); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* HIỆU ỨNG RÚT ROBUX */
        .withdraw-area { margin: 40px auto; max-width: 400px; padding: 20px; text-align: center; border: 2px dashed var(--sakura); border-radius: 20px; }
        input { width: 80%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 10px; background: #222; color: #fff; outline: 1px solid var(--sakura); }
        .btn-withdraw { background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue)); color: #fff; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 85%; }

        /* Cánh hoa rơi đa sắc */
        .petal { position: absolute; border-radius: 100% 0 100% 0; pointer-events: none; animation: fall linear infinite; }
    </style>
</head>
<body>

    <header>
        <div class="logo">🌸 SAKURA SHOP</div>
        <div class="stats">
            <div class="stat-card" style="color:var(--neon-green)">💰 <span id="money">100,000</span></div>
            <div class="stat-card" style="color:var(--neon-blue)">💎 <span id="robux">0</span></div>
        </div>
    </header>

    <div class="grid">
        <div class="card" onclick="openBox(49000, 'ROBUX PACK', 'https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg')">
            <div class="price-badge">49K</div>
            <div class="card-img">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="item-icon">
                <div class="item-label">5,000 ROBUX</div>
            </div>
            <div class="card-info"><div class="buy-txt">BẤM ĐỂ KHUI QUÀ</div></div>
        </div>

        <div class="card" onclick="openBox(99000, 'BLOX FRUIT', 'https://api.dicebear.com/7.x/bottts/svg?seed=fruit')">
            <div class="price-badge">99K</div>
            <div class="card-img">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=fruit" class="item-icon">
                <div class="item-label">RANDOM FRUIT</div>
            </div>
            <div class="card-info"><div class="buy-txt">TỈ LỆ RA KITSUNE CAO</div></div>
        </div>

        <div class="card" onclick="openBox(199000, 'BADDIES BRAWL', 'https://api.dicebear.com/7.x/avataaars/svg?seed=baddy')">
            <div class="price-badge">199K</div>
            <div class="card-img">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=baddy" class="item-icon">
                <div class="item-label">BADDIES PACK</div>
            </div>
            <div class="card-info"><div class="buy-txt">GÓI NHÂN VẬT VIP</div></div>
        </div>

        <div class="card" onclick="openBox(500000, 'SUPER MECH', 'https://api.dicebear.com/7.x/bottts/svg?seed=mech')">
            <div class="price-badge">500K</div>
            <div class="card-img">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=mech" class="item-icon">
                <div class="item-label">GODLY ITEM</div>
            </div>
            <div class="card-info"><div class="buy-txt">VẬT PHẨM TỐI THƯỢNG</div></div>
        </div>
    </div>

    <div class="withdraw-area">
        <h2 style="color:var(--neon-blue); margin-top:0;">💎 RÚT ROBUX TỨ THÌ</h2>
        <input type="text" id="wdUser" placeholder="Tên nhân vật Roblox...">
        <input type="number" id="wdAmt" placeholder="Số lượng Robux...">
        <button class="btn-withdraw" onclick="withdraw()">XÁC NHẬN RÚT NGAY</button>
        <p id="statusTxt" style="font-size:12px; margin-top:10px; color:#888;"></p>
    </div>

    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color:var(--sakura); margin:0;">ĐANG KHUI QUÀ...</h2>
            <div id="loader" class="loading-spin"></div>
            <div id="result" style="display:none;">
                <img id="resultImg" src="" style="width:120px; filter: drop-shadow(0 0 20px var(--neon-pink));">
                <h3 id="resultTxt" style="color:#00ff00;">BẠN ĐÃ NHẬN ĐƯỢC!</h3>
                <button onclick="closeModal()" style="background:var(--sakura); border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">TUYỆT VỜI</button>
            </div>
        </div>
    </div>

    <script>
        let money = 100000;
        let robux = 0;

        // --- TRỢ CẤP 100K MỖI 10 GIÂY ---
        setInterval(() => {
            money += 100000;
            update();
        }, 10000);

        function update() {
            document.getElementById('money').innerText = money.toLocaleString();
            document.getElementById('robux').innerText = robux.toLocaleString();
        }

        function openBox(price, type, img) {
            if(money < price) { alert("Thiếu tiền rồi! Đợi 10s nhé."); return; }
            money -= price; update();

            const modal = document.getElementById('giftModal');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const title = document.getElementById('modalTitle');
            
            modal.style.display = 'flex';
            loader.style.display = 'block';
            result.style.display = 'none';
            title.innerText = "ĐANG XỬ LÝ GIAO DỊCH...";

            setTimeout(() => {
                loader.style.display = 'none';
                result.style.display = 'block';
                title.innerText = "CHÚC MỪNG!";
                document.getElementById('resultImg').src = img;
                
                // Giả lập cộng quà
                if(type === 'ROBUX PACK') { 
                    robux += 5000; 
                    document.getElementById('resultTxt').innerText = "BẠN NHẬN 5,000 ROBUX!";
                } else {
                    document.getElementById('resultTxt').innerText = "BẠN NHẬN VẬT PHẨM: " + type;
                }
                update();
            }, 2500);
        }

        function closeModal() { document.getElementById('giftModal').style.display = 'none'; }

        function withdraw() {
            let user = document.getElementById('wdUser').value;
            let amt = document.getElementById('wdAmt').value;
            let stt = document.getElementById('statusTxt');

            if(!user || !amt) { alert("Nhập đủ thông tin mới rút được!"); return; }
            if(amt > robux) { alert("Bạn không đủ Robux để rút!"); return; }

            stt.innerText = "🚀 Đang gửi yêu cầu đến Admin hệ thống...";
            stt.style.color = "yellow";

            setTimeout(() => {
                robux -= amt; update();
                stt.innerText = "✅ THÀNH CÔNG! Robux sẽ được chuyển đến " + user + " sau 5-10 phút.";
                stt.style.color = "#00ff00";
            }, 3000);
        }

        // Cánh hoa Sakura đa sắc
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 8 + 5 + 'px';
            p.style.background = ['#ffb7c5', '#ff007f', '#00f2ff'][Math.floor(Math.random()*3)];
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            p.style.top = "-10px";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }, 200);

        update();
    </script>
</body>
</html>
