<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sakura Redeem</title>
    <style>
        :root { --sakura-pink: #ffb7c5; --light-pink: #ffe4e8; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }

        /* Nền hoa anh đào xịn */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.alphacoders.com/605/605592.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .container {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .card {
            background: rgba(20, 10, 15, 0.85); padding: 40px; border-radius: 25px;
            border: 2px solid var(--sakura-pink); text-align: center; width: 330px;
            backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(255, 183, 197, 0.2);
            position: relative;
        }

        .logo { width: 150px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #fff); }
        h2 { color: #fff; text-shadow: 0 0 15px var(--sakura-pink); letter-spacing: 2px; margin: 5px 0; }

        .input-area {
            background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 15px;
            padding: 12px; margin: 25px 0 15px; text-align: left;
        }
        input {
            background: transparent; border: none; color: #00ff00; font-size: 20px;
            width: 100%; outline: none; font-weight: bold; text-align: center;
        }

        /* Nút xác nhận với hiệu ứng tỏa sáng */
        .btn-redeem {
            background: linear-gradient(45deg, var(--sakura-pink), #ff8fa3);
            border: none; padding: 15px; width: 100%; border-radius: 15px;
            font-size: 18px; font-weight: bold; color: #4a101a; cursor: pointer;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .btn-redeem:active { transform: scale(0.95); }

        /* Hiệu ứng Loading kiểu Nhật Bản */
        .loading-glow {
            display: none; width: 30px; height: 30px; border: 4px solid var(--light-pink);
            border-top: 4px solid #ff0055; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Nút Discord ở dưới cùng */
        .discord-btn {
            margin-top: 25px; display: inline-block; text-decoration: none;
            color: #fff; background: #5865F2; padding: 10px 20px;
            border-radius: 10px; font-size: 13px; font-weight: bold;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }
        .discord-btn:hover { background: #4752c4; transform: translateY(-3px); }

        /* Cánh hoa rơi */
        .petal { position: absolute; background: var(--sakura-pink); border-radius: 100% 0 100% 0; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
        
        #msg { margin-top: 15px; font-weight: bold; min-height: 40px; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="logo">
            <h2>🌸 SAKURA REDEEM 🌸</h2>
            <p style="font-size: 11px; color: var(--sakura-pink);">Nhập mã để nhận vật phẩm giới hạn</p>
            
            <div class="input-area">
                <input type="text" id="codeIn" placeholder="NHẬP MÃ TẠI ĐÂY">
            </div>

            <button id="mainBtn" class="btn" style="display:none;"></button> <button class="btn-redeem" id="redeemBtn" onclick="startRedeem()">XÁC NHẬN MÃ</button>
            
            <div id="loader" class="loading-glow"></div>
            <div id="msg"></div>

            <a href="LINK_DISCORD_CUA_BAN_O_DAY" class="discord-btn" target="_blank">
                💬 THAM GIA DISCORD NHẬN CODE
            </a>
        </div>
    </div>

    <script>
        const myCodes = ["CODE1", "CODE2", "CODE3", "CODE4"];

        function startRedeem() {
            let val = document.getElementById('codeIn').value.trim().toUpperCase();
            let msg = document.getElementById('msg');
            let btn = document.getElementById('redeemBtn');
            let loader = document.getElementById('loader');

            if(val === "") {
                msg.style.color = "yellow";
                msg.innerHTML = "Vui lòng nhập mã!";
                return;
            }

            // Hiệu ứng Loading
            btn.style.display = "none";
            loader.style.display = "block";
            msg.innerHTML = "";

            setTimeout(() => {
                loader.style.display = "none";
                btn.style.display = "block";

                if(myCodes.includes(val)) {
                    msg.style.color = "#00ff00";
                    msg.style.textShadow = "0 0 10px #00ff00";
                    msg.innerHTML = "✅ THÀNH CÔNG! <br> Vật phẩm đã được chuyển vào kho.";
                } else {
                    msg.style.color = "#ff4d4d";
                    msg.innerHTML = "❌ MÃ SAI HOẶC ĐÃ HẾT HẠN!";
                }
            }, 2000); // Đợi 2 giây loanding
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            let size = Math.random() * 7 + 5 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.animationDuration = Math.random() * 4 + 3 + 's';
            p.style.opacity = Math.random();
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 6000);
        }
        setInterval(createPetal, 250);
    </script>
</body>
</html>
