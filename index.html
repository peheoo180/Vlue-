<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP SAKURA - SIMULATOR</title>
    <style>
        :root { --sakura: #ffb7c5; --gold: #ffd700; --admin: #00f2ff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* Nền Sakura */
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.alphacoders.com/605/605592.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .header { text-align: center; padding: 20px; }
        h1 { font-size: 40px; color: #fff; text-shadow: 0 0 20px var(--sakura); letter-spacing: 5px; margin: 0; }

        .stats-bar {
            display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.6);
            padding: 15px; border-bottom: 2px solid var(--sakura); position: sticky; top: 0; z-index: 100;
        }
        .stat-item { font-weight: bold; font-size: 18px; border: 1px solid var(--sakura); padding: 5px 15px; border-radius: 20px; }
        .admin-tag { color: var(--admin); text-shadow: 0 0 10px var(--admin); display: none; }

        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        /* Vòng quay */
        .wheel-container {
            position: relative; width: 300px; height: 300px;
            border: 10px solid var(--sakura); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,183,197,0.1); box-shadow: 0 0 30px var(--sakura);
        }
        .wheel-pointer {
            position: absolute; top: -20px; width: 30px; height: 40px;
            background: #ff0055; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10;
        }
        .wheel-inner {
            font-weight: bold; font-size: 20px; text-align: center;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .spin-btn {
            margin-top: 30px; padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: var(--sakura); border: none; border-radius: 50px; cursor: pointer;
            transition: 0.3s; color: #4a101a;
        }
        .spin-btn:disabled { background: #555; cursor: not-allowed; }
        .spin-btn:hover:not(:disabled) { transform: scale(1.1); box-shadow: 0 0 20px var(--sakura); }

        .timer-text { margin-top: 10px; font-size: 14px; color: var(--sakura); }

        /* Thông báo nhỏ */
        .info { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: rgba(255,255,255,0.3); }

        /* Cánh hoa rơi */
        .petal { position: absolute; background: var(--sakura); border-radius: 100% 0 100% 0; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
        @keyframes spin_wheel { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="info">Mô phỏng Simulator - Tiền giả giải trí - Không có giá trị thật.</div>

    <div class="header">
        <h1>SHOP SAKURA</h1>
    </div>

    <div class="stats-bar">
        <div class="stat-item admin-tag" id="adminTag">ADMIN MODE</div>
        <div class="stat-item" style="color: #00ff00;">Tiền: <span id="moneyDisplay">0</span>$</div>
        <div class="stat-item" style="color: #00f2ff;">Robux: <span id="robuxDisplay">0</span> R$</div>
    </div>

    <div class="container">
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel-inner" id="wheel">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="100"><br>
                LUCK SPIN
            </div>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">QUAY (Miễn phí mỗi 30s)</button>
        <p class="timer-text" id="timerText">Sẵn sàng để quay!</p>

        <p style="margin-top: 40px; font-size: 14px; opacity: 0.8;">Mẹo: Nhập mã "ADMIN" vào ô đổi thưởng để bật hack!</p>
        <input type="text" id="adminCode" placeholder="Nhập code tại đây..." 
               style="background:rgba(0,0,0,0.5); border:1px solid var(--sakura); color:#fff; padding:10px; border-radius:10px; text-align:center;">
        <button onclick="checkAdmin()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; margin-top:5px; border-radius:5px; cursor:pointer;">KÍCH HOẠT</button>
    </div>

    <script>
        let money = 0;
        let robux = 0;
        let isAdmin = false;
        let canSpin = true;
        let spinCount = 0;

        const moneyDisplay = document.getElementById('moneyDisplay');
        const robuxDisplay = document.getElementById('robuxDisplay');
        const spinBtn = document.getElementById('spinBtn');
        const timerText = document.getElementById('timerText');
        const wheel = document.getElementById('wheel');

        // Hệ thống cộng tiền mỗi giây
        setInterval(() => {
            if (isAdmin) {
                money += 1000000000; // 1 tỷ mỗi giây cho Admin
            } else {
                money += 100; // Người thường 100$ mỗi giây cho vui
            }
            updateDisplay();
        }, 1000);

        function updateDisplay() {
            moneyDisplay.innerText = money.toLocaleString();
            robuxDisplay.innerText = robux.toLocaleString();
        }

        function checkAdmin() {
            let code = document.getElementById('adminCode').value.trim().toUpperCase();
            if (code === "ADMIN") {
                isAdmin = true;
                document.getElementById('adminTag').style.display = 'block';
                alert("ĐÃ KÍCH HOẠT QUYỀN ADMIN - TỔNG TÀI 1 TỶ ĐÔ!");
            } else {
                alert("Sai mã rồi bạn ơi!");
            }
        }

        function spinWheel() {
            if (!canSpin) return;

            canSpin = false;
            spinBtn.disabled = true;
            
            // Hiệu ứng quay
            let extraDeg = Math.floor(Math.random() * 360) + 1800; // Quay ít nhất 5 vòng
            wheel.style.transform = `rotate(${extraDeg}deg)`;

            setTimeout(() => {
                // Các mức thưởng: 10k, 50k, 100k, 500k
                const prizes = [10000, 50000, 100000, 500000];
                let win = prizes[Math.floor(Math.random() * prizes.length)];
                robux += win;
                alert(`🌸 CHÚC MỪNG! Bạn đã quay trúng ${win.toLocaleString()} Robux!`);
                updateDisplay();
                startTimer(30);
            }, 4000);
        }

        function startTimer(seconds) {
            let time = seconds;
            let interval = setInterval(() => {
                time--;
                timerText.innerText = `Chờ tiếp sau: ${time}s`;
                if (time <= 0) {
                    clearInterval(interval);
                    canSpin = true;
                    spinBtn.disabled = false;
                    timerText.innerText = "Sẵn sàng để quay!";
                }
            }, 1000);
        }

        // Hoa anh đào
        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            let size = Math.random() * 7 + 5 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
