<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Redeem Center</title>
    <style>
        :root { --pink: #ffb7c5; }
        body, html { margin: 0; padding: 0; height: 100%; background: #0d0d0d; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- MÀN HÌNH LOADING --- */
        #loader {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--pink);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: var(--pink); margin-top: 15px; letter-spacing: 2px; font-size: 12px; }

        /* --- GIAO DIỆN CHÍNH --- */
        #main-content {
            display: none; height: 100vh; width: 100vw;
            justify-content: center; align-items: center;
            /* Thay link nền chuẩn không bị chữ ImgBB */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://wallpaperaccess.com/full/1151165.jpg');
            background-size: cover; background-position: center;
        }

        .disclaimer {
            position: absolute; top: 10px; right: 10px; font-size: 9px;
            color: rgba(255,255,255,0.3); text-align: right;
        }

        .card {
            background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 25px;
            border: 1.5px solid var(--pink); text-align: center; width: 320px;
            box-shadow: 0 0 30px rgba(255, 183, 197, 0.2); backdrop-filter: blur(10px);
        }

        .logo { width: 140px; margin-bottom: 10px; filter: drop-shadow(0 0 5px #fff); }
        h2 { font-size: 24px; color: #fff; text-shadow: 0 0 10px var(--pink); margin: 5px 0; }
        
        .input-area {
            background: #000; border: 1.5px solid #fff; border-radius: 12px;
            padding: 10px; margin: 20px 0; text-align: left;
        }
        input {
            background: transparent; border: none; color: #fff; font-size: 18px;
            width: 100%; outline: none; font-weight: bold;
        }

        .btn {
            background: linear-gradient(to bottom, #ffcbd5, #ff8fa3);
            border: none; padding: 12px; width: 100%; border-radius: 12px;
            font-size: 18px; font-weight: bold; color: #4a101a; cursor: pointer;
        }

        /* Hiệu ứng hoa rơi */
        .petal { position: absolute; background: var(--pink); border-radius: 100% 0 100% 0; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">ĐANG TẢI DỮ LIỆU...</div>
    </div>

    <div id="main-content">
        <div class="disclaimer">
            This is a simulation only. <br> Đây chỉ là mô phỏng giải trí.
        </div>

        <div class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" class="logo">
            <h2>🌸 REDEEM CENTER 🌸</h2>
            <p style="font-size: 11px; opacity: 0.7;">Nhập mã tự vẽ của bạn vào đây</p>
            
            <div class="input-area">
                <span style="font-size: 9px; color: #888; display: block;">ENTER CODE HERE...</span>
                <input type="text" id="codeIn" placeholder="CODE123...">
            </div>

            <button class="btn" onclick="redeem()">🌸 XÁC NHẬN MÃ 🌸</button>
            <div id="msg" style="margin-top: 15px; font-weight: bold; font-size: 13px;"></div>
        </div>
    </div>

    <script>
        // Hiệu ứng Loading biến mất sau 2 giây
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
            }, 2000); 
        };

        const myCodes = ["MA1", "MA2", "MA3", "MA4"];

        function redeem() {
            let val = document.getElementById('codeIn').value.trim().toUpperCase();
            let msg = document.getElementById('msg');
            if(myCodes.includes(val)) {
                msg.style.color = "#00ff00";
                msg.innerHTML = "✅ THÀNH CÔNG! <br> Vật phẩm đã được chuyển vào kho.";
            } else {
                msg.style.color = "#ff4d4d";
                msg.innerHTML = "❌ MÃ SAI RỒI!";
            }
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            let size = Math.random() * 8 + 5 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
