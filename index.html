<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAKURA SHOP - SIMULATOR</title>
    <style>
        :root { --sakura: #ffb7c5; --dark-pink: #ff8fa3; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* Disclaimer chuyên nghiệp */
        .top-bar { background: rgba(255, 183, 197, 0.1); text-align: center; padding: 5px; font-size: 10px; color: var(--sakura); letter-spacing: 1px; }

        /* Header sạch sẽ */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,183,197,0.3); background: rgba(0,0,0,0.5); }
        .logo-text { font-size: 22px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--sakura); }
        .balance-box { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--sakura); font-size: 14px; }

        /* Danh mục sản phẩm */
        .shop-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 800px; margin: auto; }
        
        .item-card { background: #1a1a1a; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,183,197,0.2); transition: 0.3s; }
        .item-card:hover { border-color: var(--sakura); transform: translateY(-5px); }
        
        .item-img { width: 100%; height: 160px; background: #252525; display: flex; justify-content: center; align-items: center; position: relative; }
        .item-img img { width: 80%; filter: drop-shadow(0 0 10px var(--sakura)); }
        .price-tag { position: absolute; top: 10px; left: 10px; background: var(--sakura); color: #4a101a; padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }

        .item-info { padding: 12px; text-align: center; }
        .item-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: var(--sakura); }
        
        .btn-view { background: transparent; border: 1.5px solid var(--sakura); color: var(--sakura); padding: 8px 0; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; text-decoration: none; display: block; font-size: 12px; }
        .btn-view:hover { background: var(--sakura); color: #4a101a; }

        /* Admin Dashboard nhỏ ở dưới */
        .admin-panel { text-align: center; padding: 20px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        #admin-status { font-size: 12px; color: #00f2ff; margin-bottom: 10px; display: none; }

        /* Cánh hoa rơi */
        .petal { position: absolute; background: var(--sakura); border-radius: 100% 0 100% 0; pointer-events: none; animation: fall linear infinite; z-index: 100; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="top-bar">SIMULATOR MODE • GIẢI TRÍ KHÔNG CỔ XÚY LỪA ĐẢO</div>

    <header>
        <div class="logo-text">SAKURA SHOP</div>
        <div class="balance-box">💰 <span id="money">0</span>$ | 💎 <span id="robux">0</span></div>
    </header>

    <div class="shop-container">
        <div class="item-card">
            <div class="item-img">
                <div class="price-tag">49K</div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="item">
            </div>
            <div class="item-info">
                <div class="item-title">Hộp Quà Anh Đào</div>
                <button class="btn-view" onclick="buy(49000)">XEM CHI TIẾT</button>
            </div>
        </div>

        <div class="item-card">
            <div class="item-img">
                <div class="price-tag">99K</div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="item">
            </div>
            <div class="item-info">
                <div class="item-title">Vòng Quay May Mắn</div>
                <button class="btn-view" onclick="buy(99000)">XEM CHI TIẾT</button>
            </div>
        </div>

        <div class="item-card">
            <div class="item-img">
                <div class="price-tag">149K</div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="item">
            </div>
            <div class="item-info">
                <div class="item-title">Túi Mù Đại Gia</div>
                <button class="btn-view" onclick="buy(149000)">XEM CHI TIẾT</button>
            </div>
        </div>

        <div class="item-card">
            <div class="item-img">
                <div class="price-tag">VIP</div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="item">
            </div>
            <div class="item-info">
                <div class="item-title">Gói Tộc V4 Sakura</div>
                <button class="btn-view" onclick="buy(500000)">XEM CHI TIẾT</button>
            </div>
        </div>
    </div>

    <div class="admin-panel">
        <div id="admin-status">★ ADMIN CHÍNH HIỆU ★ (+1 tỷ/s)</div>
        <input type="text" id="codeIn" placeholder="Nhập code Admin..." style="background:#222; border:1px solid var(--sakura); color:#fff; padding:8px; border-radius:5px;">
        <button onclick="checkAdmin()" style="cursor:pointer; background:var(--sakura); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">KÍCH HOẠT</button>
    </div>

    <script>
        let money = 0;
        let robux = 0;
        let isAdmin = false;

        // Tự cộng tiền
        setInterval(() => {
            if(isAdmin) {
                money += 1000000000;
            } else {
                money += 100;
            }
            document.getElementById('money').innerText = money.toLocaleString();
            document.getElementById('robux').innerText = robux.toLocaleString();
        }, 1000);

        function checkAdmin() {
            let code = document.getElementById('codeIn').value.trim().toUpperCase();
            if(code === "ADMIN") {
                isAdmin = true;
                document.getElementById('admin-status').style.display = 'block';
                alert("Chào Admin Sakura! Tiền đang nhảy rồi đó.");
            } else {
                alert("Mã này chỉ dành cho chủ shop!");
            }
        }

        function buy(price) {
            alert("Đây là bản Simulator! Bạn đang xem vật phẩm giá " + price.toLocaleString() + "$. Chúc bạn giải trí vui vẻ!");
        }

        // Hiệu ứng hoa rơi cho thơm web
        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            let size = Math.random() * 7 + 5 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            p.style.top = "-10px";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
